apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-producer
  template:
    metadata:
      labels:
        app: message-producer
    spec:
      containers:
       - name: message-producer
         image: message-producer:0.0
         ports:
           - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: message-producer-service
  labels:
    app: message-producer-service
spec:
  ports:
    - name: client
      port: 8080
      targetPort: 8080
  selector:
    app: message-producer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: message-producer-ingress
spec:
  rules:
    - host: messageproducer
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: message-producer-service
                port:
                  number: 8080
