apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: default
  name: minio
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      name: minio
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: bitnami/minio:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              value: miniouser
            - name: MINIO_ROOT_PASSWORD
              value: miniopassword
          ports:
            - containerPort: 9000
              protocol: TCP
            - containerPort: 9001
              protocol: TCP
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: minio
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console-service
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 9001
      targetPort: 9001
  selector:
    app: minio

